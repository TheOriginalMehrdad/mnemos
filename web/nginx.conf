server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Local dev: never cache app sources so edits to app/*.jsx, api.js, data/*
  # are always picked up on reload.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires off;
    try_files $uri $uri/ /index.html;
  }
}
