services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: eruditio
      POSTGRES_PASSWORD: eruditio
      POSTGRES_DB: eruditio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eruditio -d eruditio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://eruditio:eruditio@postgres:5432/eruditio?schema=public"
      REDIS_URL: "redis://redis:6379"
      VAULT_PATH: "/vault"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload: mount source over the image copy
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared/src:/app/packages/shared/src
      # The watched Markdown vault (create ./vault locally and drop .md files in it)
      - ./vault:/vault
      # Keep container node_modules isolated from host
      - api_node_modules:/app/node_modules

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      # Serve the static frontend (index.html, app/, styles/, data/) read-only
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app:/usr/share/nginx/html/app:ro
      - ./styles:/usr/share/nginx/html/styles:ro
      - ./data:/usr/share/nginx/html/data:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  api_node_modules:
